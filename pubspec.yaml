name: flutter_starter_kit
publish_to: none

environment:
  sdk: ">=3.12.2 <4.0.0"

workspace:
  - apps/main
  - packages/core
  - packages/core_network
  - packages/core_storage
  - packages/core_ui
  - packages/shared/shared_auth
  - packages/shared/shared_assessment
  - packages/features/feature_auth
  - packages/features/feature_assessment
  - packages/features/feature_dashboard
  - packages/features/feature_profile
  - packages/features/feature_notification

dev_dependencies:
  melos: ^8.0.0

melos:
  scripts:
    # ── Analisis & formatting ──────────────────────────────
    analyze:
      run: melos exec -- dart analyze .
      description: "Analisis static seluruh workspace"

    format:check:
      run: melos exec -- dart format --set-exit-if-changed .
      description: "Cek formatting seluruh workspace"

    format:fix:
      run: melos exec -- dart format .
      description: "Auto-fix formatting seluruh workspace"

    lint:
      run: |
        melos run analyze
        melos run format:check
      description: "Jalankan analyze + format check sekaligus"

    # ── Testing ───────────────────────────────────────────
    test:
      run: >
        melos exec
        --fail-fast
        --dir-exists=test
        -- flutter test --coverage
      description: "Jalankan semua test di seluruh workspace"

    test:unit:
      run: >
        melos exec
        --dir-exists=test/unit
        -- flutter test test/unit
      description: "Jalankan unit test saja"

    test:widget:
      run: >
        melos exec
        --dir-exists=test/widget
        -- flutter test test/widget
      description: "Jalankan widget test saja"

    # ── Code generation ───────────────────────────────────
    gen:
      run: >
        melos exec
        --depends-on="build_runner"
        -- dart run build_runner build --delete-conflicting-outputs
      description: "Jalankan build_runner di package yang membutuhkannya"

    gen:watch:
      run: >
        melos exec
        --depends-on="build_runner"
        -- dart run build_runner watch --delete-conflicting-outputs
      description: "Watch mode untuk code generation"

    gen:l10n:
      run: cd apps/main && flutter gen-l10n
      description: "Generate localization dari ARB files"

    # ── Utilities ─────────────────────────────────────────
    clean:
      run: melos exec -- flutter clean
      description: "Clean semua package"

    get:
      run: dart pub get
      description: "Update semua dependencies"

    upgrade:
      run: dart pub upgrade
      description: "Upgrade semua dependencies ke versi terbaru"

    outdated:
      run: melos exec -- dart pub outdated
      description: "Cek dependency yang outdated di semua package"

    # ── Feature scaffolding ───────────────────────────────
    feature:new:
      run: cd tools/mason && mason make feature_brick
      description: "Buat fitur baru dengan Mason brick"
