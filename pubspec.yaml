name: flutter_starter_kit
publish_to: none

environment:
  sdk: ">=3.12.2 <4.0.0"

workspace:
  - apps/main
  - packages/core
  - packages/core_network
  - packages/core_storage
  - packages/core_ui
  - packages/shared/shared_auth
  - packages/shared/shared_assessment
  - packages/features/feature_auth
  - packages/features/feature_assessment
  - packages/features/feature_dashboard
  - packages/features/feature_profile
  - packages/features/feature_notification

dev_dependencies:
  melos: ^8.0.0

melos:
  scripts:
    # ── Setup ─────────────────────────────────────────────
    setup:
      run: |
        dart pub get
        melos run gen:l10n
        melos run gen
      description: "Setup awal — install deps, generate l10n dan mock files. Jalankan ini setelah clone repo."

    # ── Run app ───────────────────────────────────────────
    run:dev:
      run: >
        cd apps/main &&
        flutter run
        --target lib/main.dart
        --dart-define-from-file=../../config/development.json
      description: "Jalankan app di mode development"

    run:dev:android:
      run: >
        cd apps/main &&
        flutter run
        --target lib/main.dart
        --dart-define-from-file=../../config/development.json
        -d android
      description: "Jalankan app di Android (development)"

    run:dev:ios:
      run: >
        cd apps/main &&
        flutter run
        --target lib/main.dart
        --dart-define-from-file=../../config/development.json
        -d ios
      description: "Jalankan app di iOS (development)"

    run:dev:web:
      run: >
        cd apps/main &&
        flutter run
        --target lib/main.dart
        --dart-define-from-file=../../config/development.json
        -d chrome
      description: "Jalankan app di Chrome (development)"

    run:staging:
      run: >
        cd apps/main &&
        flutter run
        --target lib/main_staging.dart
        --dart-define-from-file=../../config/staging.json
      description: "Jalankan app di mode staging"

    # ── Build (staging — tanpa obfuscation, untuk testing) ──
    build:android:staging:
      run: >
        cd apps/main &&
        flutter build apk
        --target lib/main_staging.dart
        --dart-define-from-file=../../config/staging.json
        --release
      description: "Build Android APK (staging, tanpa obfuscation)"

    build:ios:staging:
      run: >
        cd apps/main &&
        flutter build ipa
        --target lib/main_staging.dart
        --dart-define-from-file=../../config/staging.json
        --release
      description: "Build iOS IPA (staging, tanpa obfuscation)"

    build:web:staging:
      run: >
        cd apps/main &&
        flutter build web
        --target lib/main_staging.dart
        --dart-define-from-file=../../config/staging.json
        --release
      description: "Build PWA (staging)"

    # ── Build (production — DENGAN obfuscation) ──────────────
    build:android:prod:
      run: >
        cd apps/main &&
        flutter build apk
        --target lib/main_production.dart
        --dart-define-from-file=../../config/production.json
        --release
        --obfuscate
        --split-debug-info=build/symbols/android
      description: "Build Android APK (production, dengan obfuscation)"

    build:ios:prod:
      run: >
        cd apps/main &&
        flutter build ipa
        --target lib/main_production.dart
        --dart-define-from-file=../../config/production.json
        --release
        --obfuscate
        --split-debug-info=build/symbols/ios
      description: "Build iOS IPA (production, dengan obfuscation)"

    build:web:prod:
      run: >
        cd apps/main &&
        flutter build web
        --target lib/main_production.dart
        --dart-define-from-file=../../config/production.json
        --release
      description: "Build PWA (production) — obfuscation tidak didukung untuk Web"

    # ── Analisis & formatting ──────────────────────────────
    analyze:
      run: melos exec -- dart analyze .
      description: "Analisis static seluruh workspace"

    format:check:
      run: melos exec -- dart format --set-exit-if-changed .
      description: "Cek formatting seluruh workspace"

    format:fix:
      run: melos exec -- dart format .
      description: "Auto-fix formatting seluruh workspace"

    lint:
      run: |
        melos run analyze
        melos run format:check
      description: "Jalankan analyze + format check sekaligus"

    # ── Testing ───────────────────────────────────────────
    test:
      run: >
        melos exec
        --dir-exists=test/unit
        -- flutter test test/unit --coverage
      description: "Jalankan semua unit test di seluruh workspace"

    test:widget:
      run: >
        melos exec
        --dir-exists=test/widget
        -- flutter test test/widget
      description: "Jalankan widget test saja"

    test:generate:
      run: bash tools/scripts/generate_test.sh
      description: "Generate unit test untuk feature. Usage: melos run test:generate -- product"

    # ── Code generation ───────────────────────────────────
    gen:
      run: >
        melos exec
        --depends-on="build_runner"
        -- dart run build_runner build
      description: "Jalankan build_runner di package yang membutuhkannya"

    gen:watch:
      run: >
        melos exec
        --depends-on="build_runner"
        -- dart run build_runner watch
      description: "Watch mode untuk code generation"

    gen:l10n:
      run: cd apps/main && flutter gen-l10n
      description: "Generate localization dari ARB files"

    # ── Utilities ─────────────────────────────────────────
    clean:
      run: melos exec -- flutter clean
      description: "Clean semua package"

    get:
      run: dart pub get
      description: "Update semua dependencies"

    upgrade:
      run: dart pub upgrade
      description: "Upgrade semua dependencies ke versi terbaru"

    outdated:
      run: melos exec -- dart pub outdated
      description: "Cek dependency yang outdated di semua package"

    # ── Feature scaffolding ───────────────────────────────
    feature:new:
      run: cd tools/mason && mason make feature_brick
      description: "Buat fitur baru dengan Mason brick"
