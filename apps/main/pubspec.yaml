name: main_app
description: "Flutter Starter Kit - Main Application"
publish_to: none
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ">=3.12.2 <4.0.0"
  flutter: ">=3.44.3"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core packages
  core:
    path: ../../packages/core
  core_network:
    path: ../../packages/core_network
  core_storage:
    path: ../../packages/core_storage
  core_ui:
    path: ../../packages/core_ui
  core_l10n:
    path: ../../packages/core_l10n

  # Shared packages
  shared_auth:
    path: ../../packages/shared/shared_auth
  shared_assessment:
    path: ../../packages/shared/shared_assessment

  # Feature packages
  feature_auth:
    path: ../../packages/features/feature_auth
  feature_assessment:
    path: ../../packages/features/feature_assessment
  feature_dashboard:
    path: ../../packages/features/feature_dashboard
  feature_profile:
    path: ../../packages/features/feature_profile
  feature_notification:
    path: ../../packages/features/feature_notification

  # Navigation
  go_router: ^17.3.0

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1

  # DI
  get_it: ^9.2.1
  connectivity_plus: ^7.1.1
  sentry_flutter: ^8.14.2

  # Splash screen — dependency (bukan dev_dependency) karena preserve()/
  # remove() dipanggil dari bootstrap.dart saat runtime, bukan cuma
  # dipakai sebagai code generator sekali jalan (lihat komentar di
  # bootstrap.dart untuk alasan preserve/remove-nya).
  flutter_native_splash: ^2.4.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true

# flutter_launcher_icons TIDAK didaftarkan sebagai dependency di sini —
# versi terbaru (^0.14.x) butuh cli_util ^0.4.1, bentrok dengan cli_util
# ^0.5.0 yang diminta melos ^8.0.0 di root pubspec.yaml (satu workspace
# native cuma bisa resolve satu versi cli_util untuk semua package).
# Dipakai sebagai tool global saja (dart pub global activate
# flutter_launcher_icons), sama seperti mason_cli/rename — lihat README
# bagian Prasyarat. Config di bawah tetap dibaca tool itu dari pubspec.yaml
# project ini kalau dijalankan dari folder apps/main.
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#2563EB"
    theme_color: "#2563EB"

flutter_native_splash:
  color: "#2563EB"
  image: assets/icon/icon_foreground.png
  android_12:
    color: "#2563EB"
    image: assets/icon/icon_foreground.png
  web: true
