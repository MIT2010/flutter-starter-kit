# CI ini sengaja cuma build flavor staging — starter kit ini belum tahu
# strategi rilis production project kamu (Play Store vs internal distribution,
# App Center, Fastlane, dll), jadi tidak diasumsikan di sini.
#
# config/staging.json di-gitignore (lihat root .gitignore) jadi tidak ada di
# checkout CI — direkonstruksi dari secret STAGING_CONFIG_JSON (isi persis
# sama seperti config/staging.example.json, tapi dengan nilai staging asli)
# sebelum build, lalu dipakai lewat --dart-define-from-file supaya HASILNYA
# SAMA PERSIS dengan `melos run build:*:staging` di lokal — sebelumnya di
# sini cuma di-pass 3 dari 10 key satu-satu (ENV/BASE_URL/WS_URL), jadi
# WS_APP_KEY/WS_AUTH_ENDPOINT/SENTRY_DSN dkk kosong dan build CI diam-diam
# beda dari build lokal.
#
# Setup: Settings -> Secrets and variables -> Actions -> tambahkan secret
# STAGING_CONFIG_JSON, isi = seluruh isi file config/staging.json kamu.
#
# Kalau nanti sudah siap nambah production build, groundwork-nya sudah ada:
# - Signing Android: isi apps/main/android/key.properties dari
#   apps/main/android/key.properties.example (lihat README di situ).
# - Command build production sudah ada di melos: `melos run build:android:prod`,
#   `melos run build:ios:prod`, `melos run build:web:prod` (pakai --obfuscate).
# Tinggal duplikasi job di bawah ini per flavor, target ke main_production.dart,
# secret PRODUCTION_CONFIG_JSON sendiri, dan suntik key.properties dari GitHub
# Secrets (base64 keystore + password) sebelum step build.
name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_android:
    name: Build Android APK (staging)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: dart pub get

      - name: Generate l10n
        run: melos run gen:l10n

      - name: Write staging config
        env:
          STAGING_CONFIG_JSON: ${{ secrets.STAGING_CONFIG_JSON }}
        run: echo "$STAGING_CONFIG_JSON" > config/staging.json

      - name: Build APK (staging)
        run: |
          cd apps/main
          flutter build apk \
            --target lib/main_staging.dart \
            --dart-define-from-file=../../config/staging.json

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-staging.apk
          path: apps/main/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  build_web:
    name: Build PWA (staging)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: dart pub get

      - name: Generate l10n
        run: melos run gen:l10n

      - name: Write staging config
        env:
          STAGING_CONFIG_JSON: ${{ secrets.STAGING_CONFIG_JSON }}
        run: echo "$STAGING_CONFIG_JSON" > config/staging.json

      - name: Build Web
        run: |
          cd apps/main
          flutter build web \
            --target lib/main_staging.dart \
            --dart-define-from-file=../../config/staging.json

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/main/build/web/
          retention-days: 7
