name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Push baru ke branch/PR yang sama membatalkan run sebelumnya yang masih
# jalan — supersede oleh commit terbaru, bukan antre menghabiskan quota CI.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze_and_test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: dart pub get

      - name: Generate l10n
        run: melos run gen:l10n

      - name: Generate mocks
        run: melos run gen

      - name: Verify formatting
        run: melos run format:check

      - name: Analyze
        run: melos run analyze

      - name: Run tests
        run: melos run test

      - name: Run widget tests
        run: melos run test:widget

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            packages/**/coverage/lcov.info
            apps/**/coverage/lcov.info
          retention-days: 7
          if-no-files-found: ignore
