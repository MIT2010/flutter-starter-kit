version: 2
updates:
  # Setiap package Dart/Flutter di monorepo ini listed terpisah — Dependabot
  # tidak resolve field `workspace:` di root pubspec.yaml, jadi tidak cukup
  # cuma daftarkan root saja (nanti dependency di packages/* luput di-cek).
  # Sengaja TIDAK termasuk tools/mason/bricks/*/__brick__ — pubspec.yaml di
  # situ pakai syntax Mustache ({{name}}), bukan pubspec.yaml valid.
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pub"
    directory: "/apps/main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pub"
    directory: "/packages/core"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pub"
    directory: "/packages/core_l10n"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pub"
    directory: "/packages/core_network"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pub"
    directory: "/packages/core_storage"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pub"
    directory: "/packages/core_ui"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pub"
    directory: "/packages/shared/shared_auth"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pub"
    directory: "/packages/shared/shared_assessment"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pub"
    directory: "/packages/features/feature_auth"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pub"
    directory: "/packages/features/feature_assessment"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pub"
    directory: "/packages/features/feature_dashboard"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pub"
    directory: "/packages/features/feature_profile"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pub"
    directory: "/packages/features/feature_notification"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
